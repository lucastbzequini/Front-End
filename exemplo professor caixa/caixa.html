<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa merca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  

    <style>
        .topo{
            background: #ffc107;
            text-align: center;
            font-size: 43px;
            font-weight: bold;
            padding: 15px;
            border: 4px solid #000faf;
            color: #000faf;
        }
        .painel{
            background: #8a8a8a;
            padding: 20px;
            border: 2px solid #000faf;
            margin-bottom: 10px;
        }
        .total{
            font-size: 33px;
            font-weight: bold;
            text-align: right;
            color: #000faf;
        }
    </style>



</head>
<body class="bg-primary bg-gradient">
    <div class="container mt-2">
        <div class="topo">CAIXA LIVRE</div>
        <div class="row mt-3">
            <div class="col-md-7">
                <h3 class="text-white">
                    <span class="badge text-bg-primary"> SUAS COMPRAS</span>
                </h3>
                <ul id="lista" class="list-group-lista"></ul>
            </div>
        
                <div class="col md-5">
                    <div class="painel">Total: R$ <div class="total">0,00</div>
                    </div>

                    <div class="painel">
                        <label>Codigo de Barras</label>
                        <input type="text" id="cod" class="form-control">
                    </div>

                    <div class="painel">
                        <label>Quantidade</label>
                        <input type="number" id="qtd" class="form-control" value="1">
                    </div>

                    <button class="btn btn-success w-100" onclick="addproduto()">Adicionar Item</button>
                </div>
        
        </div>



    </div>

    <script src="script.js"> </script>
</body>
</html>
