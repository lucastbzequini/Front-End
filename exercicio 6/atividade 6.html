<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagochi</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <style>
    
    html {
    height: 100%; 
    margin: 0;
    padding: 0;
}

body {
    background-image: url('sabri_bg.png');
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat; 
    height: 100vh; 
    margin: 0; 
    padding: 0;
}
.bg-layer {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1s ease-in-out;
    z-index: -1;
}

#bgDia {
    background-image: url('sabri_bg.png');
    opacity: 1;
}

#bgNoite {
    background-image: url('sabri_night.png');
    opacity: 0;
}
    </style>

</head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    
    <body class="bg-pink-50 min-h-screen flex flex-col">
 

  <div id="bgDia" class="bg-layer"></div>
  <div id="bgNoite" class="bg-layer"></div>

  <div class="w-full flex items-center justify-start p-4 gap-4">

    <div class="avatar">
      <div class="w-50 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
        <img src="sabri_eat.png" />
      </div>
    </div>

    <input 
      type="text" 
      placeholder="Nome da diva..." 
      class="input input-secondary"
    />

  </div>

    <div class="fixed bottom-[1%] left-10 w-full flex flex-row items-end justify-center px-4 gap-3">
    
    <img 
      id="mainImage"
      src="sabri_neutral.png"
      alt="Imagem principal"
      class="w-full max-w-[800px] h-auto" 
    />
</div>
   




    
    <div class="fab fab-flower">
  <!-- a focusable div with tabindex is necessary to work on all browsers. role="button" is necessary for accessibility -->
  <div tabindex="0" role="button" class="btn btn-circle btn-lg">
    <img src="sabri_neutral.png"/>
  </div>

  <!-- Main Action button replaces the original button when FAB is open -->
  <button class="fab-main-action btn btn-circle btn-lg btn-primary">
   <img src="sabri_neutral.png"/>
  </button>

  <!-- buttons that show up when FAB is open -->
  <button class="btn btn-circle btn-lg">
    <img 
      src="ferlini.jpg"
      onclick="ferlini()"
    />
    
  </button>

  <button class="btn btn-circle btn-lg">
    <img 
      src="sabri_sleep.png"
      onclick="trocarfundo()"/>
  </button>

  <button class="btn btn-circle btn-lg">
    <img 
      src="sabri_food.png"
      onclick="alimentar()"
    />
  </button>
</div>

</body>

<script src="script.js"></script>
</html>
