<!DOCTYPE html>

<style>

body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;

    background: linear-gradient(135deg, #000000, #2b0033);
}


h1 {
    margin-top: 40px;
    font-size: 42px;
    color: #ff4da6;
    text-shadow: 0 0 15px rgba(255, 77, 166, 0.7);
}


div {
    margin: 15px;
}


a {
    display: inline-block;
    width: 250px;
    padding: 15px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #ff4da6, #ff1493);
    border-radius: 30px;
    font-size: 18px;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
}


a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255, 20, 147, 1);
}


.img1, .img2, .img3 {
    position: fixed;
    width: 140px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    transition: 0.3s;
}


.img1 {
    top: 80px;
    left: 30px;
    transform: rotate(-10deg);
}

.img2 {
    top: 80px;
    right: 30px;
    transform: rotate(10deg);
}

.img3 {
    bottom: 40px;
    right: 50px;
    transform: rotate(-5deg);
}


.img1:hover, .img2:hover, .img3:hover {
    transform: scale(1.1) rotate(0deg);
}

</style>
</style>
