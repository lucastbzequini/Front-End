<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to bottom, #000000, #1a001a);
    color: white;
}

/* título */
h1 {
    margin-top: 30px;
    font-size: 40px;
    color: #ff69b4;
    text-shadow: 2px 2px 10px black;
}

/* links */
div {
    margin: 20px;
}

a {
    display: inline-block;
    width: 220px;
    padding: 15px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #ff69b4, #ff1493);
    border-radius: 15px;
    font-size: 18px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

a:hover {
    transform: scale(1.1);
}

/* imagens posicionadas */
.img1 {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 120px;
    border-radius: 15px;
}

.img2 {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 120px;
    border-radius: 15px;
}

.img3 {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 140px;
    border-radius: 15px;
}

</style>
